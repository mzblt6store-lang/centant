<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <title>CentAnt: Control de Gastos Hormiga</title>
    
    <!-- PWA & Social Meta Tags -->
    <meta name="theme-color" content="#FAF9F5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CentAnt" />
    <link rel="apple-touch-icon" href="/centant-logo.jpg" />
    <link rel="icon" type="image/jpeg" href="/centant-logo.jpg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="CentAnt: Control de Gastos Hormiga" />
    <meta property="og:description" content="Visualiza, domina y elimina tus gastos hormiga diarios con facilidad." />
    <meta property="og:image" content="/centant-logo.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CentAnt: Control de Gastos Hormiga" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker safe registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('CentAnt SW registrado:', reg.scope))
            .catch((err) => console.log('SW error de registro:', err));
        });
      }
    </script>
  </body>
